
services:
  # 1. Service Aplikasi (PHP-FPM) - Production
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile.prod
    container_name: akreditasi_app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env:ro
    # Production: TIDAK mount seluruh source code, pakai image build
    extra_hosts:
      - "host-gateway:host-gateway"  # Izinkan container akses ke network host
    networks:
      - akreditasi-network

  # 2. Service Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: akreditasi_nginx
    restart: unless-stopped
    # Port tidak di-expose ke host — traffic masuk via Nginx Proxy Manager
    volumes:
      - ./.docker/nginx/datapustaka.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - akreditasi-network
      - proxy-network

  # 3. Service Redis (Cache & Queue)
  redis:
    image: redis:alpine
    container_name: akreditasi_redis
    restart: unless-stopped
    networks:
      - akreditasi-network

networks:
  akreditasi-network:
    driver: bridge

  # Shared network dengan Nginx Proxy Manager
  # Buat sekali: docker network create proxy-network
  proxy-network:
    external: true
