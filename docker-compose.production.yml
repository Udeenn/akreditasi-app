
services:
  # 1. Service Aplikasi (PHP-FPM) - Production
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile.prod
    container_name: akreditasi_app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - ./.env:/var/www/html/.env
      # Production: TIDAK mount seluruh source code, pakai image build
    extra_hosts:
      - "host-gateway:host-gateway"  # Izinkan container akses ke network host
    networks:
      - akreditasi-network

  # 2. Service Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: akreditasi_nginx
    restart: unless-stopped
    # Tidak expose port langsung ke host.
    # Traffic masuk lewat Nginx reverse proxy di level server (proxy-network).
    volumes:
      - ./.docker/nginx/datapustaka.conf:/etc/nginx/conf.d/default.conf
      - ./.docker/nginx/selfsigned.crt:/etc/nginx/ssl/selfsigned.crt
      - ./.docker/nginx/selfsigned.key:/etc/nginx/ssl/selfsigned.key
      # Mount public directory saja untuk static assets
      - ./public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - akreditasi-network
      - proxy-network  # joined ke network gateway reverse proxy

  # 3. Service Redis (Cache & Queue)
  redis:
    image: redis:alpine
    container_name: akreditasi_redis
    restart: unless-stopped
    networks:
      - akreditasi-network

networks:
  # Network internal antar service dalam aplikasi ini
  akreditasi-network:
    driver: bridge

  # Network eksternal milik Nginx reverse proxy (sudah dibuat terlebih dahulu).
  # Buat sekali di server dengan: docker network create proxy-network
  proxy-network:
    external: true
